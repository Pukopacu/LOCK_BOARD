<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0D13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lock Board</title>
<style>
:root{
  --bg:#0A0D13; --panel:#141A26; --panel2:#0F141E; --line:#222B3B;
  --ink:#EEF1F6; --dim:#7E8CA3; --faint:#4B5768;
  --deep:#2FD98B; --good:#8CD97B; --thin:#E8B33C; --dead:#6B7684; --bad:#F0575C;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Roboto Mono",monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
  -webkit-text-size-adjust:100%}
body{padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 90px)}
.wrap{max-width:560px;margin:0 auto;padding:12px 12px 0}

.head{display:flex;justify-content:space-between;align-items:center;
  padding:2px 2px 12px;border-bottom:1px solid var(--line);margin-bottom:12px}
.head h1{margin:0;font-size:12px;letter-spacing:.24em;text-transform:uppercase;
  color:var(--dim);font-weight:700}
.head .cfg{font-family:var(--mono);font-size:11px;color:var(--faint)}

/* card */
.card{background:var(--panel);border:1px solid var(--line);border-radius:13px;
  margin-bottom:10px;overflow:hidden;transition:border-color .15s}
.card.deep{border-color:var(--deep)}
.card.good{border-color:rgba(140,217,123,.55)}
.card.bad{border-color:rgba(240,87,92,.4)}

.top{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--panel2)}
.top .team{flex:1;min-width:0}
.top .team input{width:100%;background:none;border:none;color:var(--ink);
  font-family:var(--sans);font-size:15px;font-weight:700;letter-spacing:.02em;
  padding:2px 0;outline:none}
.top .team input::placeholder{color:var(--faint);font-weight:500}
.x{width:30px;height:30px;flex:none;border:none;background:none;color:var(--faint);
  font-size:20px;line-height:1;border-radius:8px;cursor:pointer}
.x:active{background:rgba(240,87,92,.15);color:var(--bad)}

.body{display:grid;grid-template-columns:1fr 1fr auto;gap:9px;padding:11px;align-items:end}
.f label{display:block;font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--dim);margin-bottom:5px;font-weight:700}
.f input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;
  color:var(--ink);font-family:var(--mono);font-size:23px;font-weight:700;
  padding:8px 6px;text-align:center;outline:none}
.f input:focus{border-color:var(--dim)}
.f input::placeholder{color:var(--faint);font-weight:400}
.f.live input{font-size:26px}

.out{text-align:right;min-width:112px;padding-bottom:2px}
.out .pair{font-family:var(--mono);font-size:34px;font-weight:800;line-height:1;
  font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.out .st{font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;font-weight:800;
  margin-top:3px}
.out .pl{font-family:var(--mono);font-size:13px;color:var(--dim);margin-top:3px;
  font-variant-numeric:tabular-nums}

.tgt{display:flex;gap:6px;padding:0 11px 11px}
.chip{flex:1;text-align:center;padding:6px 2px;border-radius:8px;background:var(--bg);
  border:1px solid var(--line)}
.chip .a{font-family:var(--mono);font-size:9px;color:var(--faint);display:block}
.chip .b{font-family:var(--mono);font-size:15px;font-weight:700;
  font-variant-numeric:tabular-nums}
.chip.on{border-color:var(--deep);background:rgba(47,217,139,.10)}
.chip.on .b{color:var(--deep)}

.empty{text-align:center;padding:46px 20px;color:var(--faint);font-size:13px;line-height:1.7}

/* bottom bar */
.bar{position:fixed;left:0;right:0;bottom:0;background:rgba(10,13,19,.94);
  backdrop-filter:blur(12px);border-top:1px solid var(--line);
  padding:11px 12px calc(11px + env(safe-area-inset-bottom));z-index:9}
.bar .in{max-width:560px;margin:0 auto;display:flex;gap:9px;align-items:center}
.add{flex:1;padding:13px;border:none;border-radius:11px;background:var(--ink);
  color:var(--bg);font-family:var(--sans);font-size:14px;font-weight:800;
  letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
.add:active{opacity:.75}
.mini{display:flex;gap:7px}
.mini input{width:62px;background:var(--panel);border:1px solid var(--line);
  border-radius:9px;color:var(--ink);font-family:var(--mono);font-size:14px;
  padding:11px 4px;text-align:center;outline:none}
.mini .lab{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);
  text-align:center;margin-top:3px;font-weight:700}
.clr{padding:13px 12px;border:1px solid var(--line);border-radius:11px;background:none;
  color:var(--faint);font-size:12px;font-weight:700;cursor:pointer}
.clr:active{color:var(--bad);border-color:var(--bad)}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>Lock Board</h1>
    <div class="cfg" id="cfg">150 ct · $0.02</div>
  </div>
  <div id="list"></div>
  <div class="empty" id="empty">
    No games on the board.<br>Tap <b>Add game</b> as each one starts.
  </div>
</div>

<div class="bar"><div class="in">
  <button class="add" id="addBtn">+ Add game</button>
  <div>
    <div class="mini"><input id="qty" inputmode="numeric" value="150"></div>
    <div class="lab">contracts</div>
  </div>
  <div>
    <div class="mini"><input id="fee" inputmode="decimal" value="0.02"></div>
    <div class="lab">fee</div>
  </div>
  <button class="clr" id="clrBtn">Clear<br>done</button>
</div></div>

<script>
let games = [];
let seq = 0;

const px = v => {
  v = String(v).trim().replace(/[^0-9.]/g,'');
  if(!v) return NaN;
  let n = parseFloat(v);
  if(isNaN(n)) return NaN;
  return n > 1.5 ? n/100 : n;
};
const money = n => (n<0?'\u2212':'+') + '$' + Math.abs(n).toFixed(2);

const ZONES = [
  {max:0.80, name:'Deep lock',       css:'var(--deep)', cls:'deep'},
  {max:0.90, name:'Good lock',       css:'var(--good)', cls:'good'},
  {max:0.96, name:'Thin',            css:'var(--thin)', cls:''},
  {max:1.00, name:'Fees eat it',     css:'var(--dead)', cls:''},
  {max:99,   name:'Do not complete', css:'var(--bad)',  cls:'bad'}
];

// ---- persistence (works when hosted; silently skips in sandboxed viewers)
const KEY = 'lockboard_v1';
let canStore = false;
try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); canStore = true; } catch(e){ canStore = false; }

function save(){
  if(!canStore) return;
  try{
    localStorage.setItem(KEY, JSON.stringify({
      games, seq,
      qty: document.getElementById('qty').value,
      fee: document.getElementById('fee').value,
      ts: Date.now()
    }));
  }catch(e){}
}

function restore(){
  if(!canStore) return false;
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return false;
    const d = JSON.parse(raw);
    // drop a board older than 18h so yesterday's games don't linger
    if(d.ts && Date.now() - d.ts > 18*3600*1000){ localStorage.removeItem(KEY); return false; }
    if(Array.isArray(d.games)) games = d.games;
    if(d.seq) seq = d.seq;
    if(d.qty) document.getElementById('qty').value = d.qty;
    if(d.fee) document.getElementById('fee').value = d.fee;
    return true;
  }catch(e){ return false; }
}

function cfg(){
  const q = Math.max(1, parseFloat(document.getElementById('qty').value) || 150);
  const f = Math.max(0, parseFloat(document.getElementById('fee').value) || 0.02);
  document.getElementById('cfg').textContent = q + ' ct · $' + f.toFixed(2);
  return {q,f};
}

function render(){
  const list = document.getElementById('list');
  document.getElementById('empty').style.display = games.length ? 'none' : 'block';
  list.innerHTML = '';
  const {q,f} = cfg();

  games.forEach(g => {
    const e = px(g.entry), a = px(g.now);
    const has = !isNaN(e) && !isNaN(a);
    const pair = has ? e + a : NaN;
    const z = has ? ZONES.find(z => pair < z.max) : null;
    const profit = has ? (1 - 2*f - pair) * q : NaN;

    const card = document.createElement('div');
    card.className = 'card' + (z && z.cls ? ' ' + z.cls : '');
    card.innerHTML = `
      <div class="top">
        <div class="team"><input placeholder="Team / game" value="${g.name||''}" data-k="name" data-id="${g.id}"></div>
        <button class="x" data-del="${g.id}">&times;</button>
      </div>
      <div class="body">
        <div class="f"><label>Entry</label>
          <input inputmode="decimal" placeholder="46" value="${g.entry||''}" data-k="entry" data-id="${g.id}"></div>
        <div class="f live"><label>Other team now</label>
          <input inputmode="decimal" placeholder="—" value="${g.now||''}" data-k="now" data-id="${g.id}"></div>
        <div class="out">
          <div class="pair" style="color:${z?z.css:'var(--faint)'}">${has?pair.toFixed(2):'—'}</div>
          <div class="st" style="color:${z?z.css:'var(--faint)'}">${z?z.name:'\u00a0'}</div>
          <div class="pl">${has?money(profit):'\u00a0'}</div>
        </div>
      </div>
      <div class="tgt">
        ${[0.90,0.85,0.80,0.75].map(t=>{
          const need = isNaN(e) ? NaN : t - e;
          const on = !isNaN(need) && !isNaN(a) && a <= need + 1e-9;
          const txt = isNaN(need) ? '—' : (need <= 0.005 ? 'n/a' : need.toFixed(2));
          return `<div class="chip${on?' on':''}"><span class="a">${t.toFixed(2)}</span><span class="b">${txt}</span></div>`;
        }).join('')}
      </div>`;
    list.appendChild(card);
  });

  list.querySelectorAll('input[data-k]').forEach(inp => {
    inp.addEventListener('input', ev => {
      const g = games.find(x => x.id == ev.target.dataset.id);
      if(!g) return;
      g[ev.target.dataset.k] = ev.target.value;
      liveUpdate();
      save();
    });
  });
  list.querySelectorAll('[data-del]').forEach(b => {
    b.addEventListener('click', ev => {
      games = games.filter(x => x.id != ev.target.dataset.del);
      render(); save();
    });
  });
}

// update numbers without rebuilding the DOM (keeps keyboard focus)
function liveUpdate(){
  const {q,f} = cfg();
  const cards = document.querySelectorAll('.card');
  games.forEach((g,i) => {
    const card = cards[i]; if(!card) return;
    const e = px(g.entry), a = px(g.now);
    const has = !isNaN(e) && !isNaN(a);
    const pair = has ? e + a : NaN;
    const z = has ? ZONES.find(z => pair < z.max) : null;
    const profit = has ? (1 - 2*f - pair) * q : NaN;
    card.className = 'card' + (z && z.cls ? ' ' + z.cls : '');
    card.querySelector('.pair').textContent = has ? pair.toFixed(2) : '—';
    card.querySelector('.pair').style.color = z ? z.css : 'var(--faint)';
    card.querySelector('.st').textContent = z ? z.name : '\u00a0';
    card.querySelector('.st').style.color = z ? z.css : 'var(--faint)';
    card.querySelector('.pl').textContent = has ? money(profit) : '\u00a0';
    card.querySelectorAll('.chip').forEach((chip,j) => {
      const t = [0.90,0.85,0.80,0.75][j];
      const need = isNaN(e) ? NaN : t - e;
      const on = !isNaN(need) && !isNaN(a) && a <= need + 1e-9;
      chip.className = 'chip' + (on ? ' on' : '');
      chip.querySelector('.b').textContent = isNaN(need) ? '—' : (need <= 0.005 ? 'n/a' : need.toFixed(2));
    });
  });
}

document.getElementById('addBtn').addEventListener('click', () => {
  games.push({id: ++seq, name:'', entry:'', now:''});
  render(); save();
  const inputs = document.querySelectorAll('.card .team input');
  if(inputs.length) inputs[inputs.length-1].focus();
});

document.getElementById('clrBtn').addEventListener('click', () => {
  const before = games.length;
  games = games.filter(g => {
    const e = px(g.entry), a = px(g.now);
    if(isNaN(e) || isNaN(a)) return true;
    return (e + a) < 1.00;          // keep anything still workable
  });
  if(games.length === before && before > 0){
    if(confirm('Nothing settled. Clear the whole board?')) games = [];
  }
  render(); save();
});

['qty','fee'].forEach(id =>
  document.getElementById(id).addEventListener('input', () => { cfg(); liveUpdate(); save(); }));

// save when the page is backgrounded or closed
window.addEventListener('pagehide', save);
window.addEventListener('beforeunload', save);
document.addEventListener('visibilitychange', () => { if(document.hidden) save(); });

restore();
render();
if(!canStore){
  const c = document.getElementById('cfg');
  c.textContent += '  ·  not saved';
  c.style.color = 'var(--bad)';
}
</script>
</body>
</html>
